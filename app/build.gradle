plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.snackrecorder'

    compileSdk {
        version = release(36) {
            it.minorApiLevel = 1
        }
    }

    buildToolsVersion '36.1.0'

    defaultConfig {
        applicationId 'com.example.snackrecorder'
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
